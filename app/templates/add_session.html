{% extends "base.html" %}

{% block title %}Add Session{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Add Training Session</h1>

<form method="POST">

  <div class="mb-3">
    <label class="form-label">Climber</label>
    <select name="climber_id" class="form-select" required>
      {% for climber in climbers %}
        <option value="{{ climber.climber_id }}">
          {{ climber.first_name }} {{ climber.last_name }}
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Session Type</label>
    <select name="session_type_id" class="form-select" required>
      {% for st in session_types %}
        <option value="{{ st.session_type_id }}">
          {{ st.session_type_name }}
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Date</label>
    <input type="date" name="session_date" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Duration (minutes)</label>
    <input type="number" name="duration_minutes" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Intensity (1–10)</label>
    <input type="number" name="perceived_intensity" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Notes</label>
    <input type="text" name="notes" class="form-control">
  </div>

  <button type="submit" class="btn btn-primary">Save Session</button>

</form>
{% endblock %}
